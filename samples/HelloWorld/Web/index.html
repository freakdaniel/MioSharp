<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MioSharp</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #dde1e7;
            border-radius: 8px;
            padding: 20px;
        }
        h1 {
            color: #1a73e8;
            margin: 0;
        }
        p {
            color: #444;
        }
        .nav {
            display: flex;
            flex-direction: row;
            gap: 12px;
            background-color: #1a73e8;
            padding: 12px 20px;
            border-radius: 8px;
        }
        .nav-item {
            color: #ffffff;
            font-size: 14px;
        }
        .counter {
            font-size: 48px;
            color: #1a73e8;
            text-align: center;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <span class="nav-item">Home</span>
            <span class="nav-item">About</span>
            <span class="nav-item">Contact</span>
        </div>
        <div class="card">
            <h1>Hello from MioSharp!</h1>
            <p>A pure C# web rendering engine powered by SkiaSharp</p>
        </div>
        <div class="card">
            <div id="counter" class="counter">0</div>
        </div>
        <div class="card">
            <div id="api-result">Loading API data...</div>
        </div>
    </div>

    <script>
        // Test JS: update counter
        var count = 0;
        function tick() {
            count++;
            var el = document.getElementById('counter');
            if (el) el.textContent = String(count);
        }
        setInterval(tick, 1000);

        // Test in-process fetch
        fetch('/api/hello')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var el = document.getElementById('api-result');
                if (el) el.textContent = 'API says: ' + data.message;
            })
            .catch(function(e) { console.error('fetch error', e); });
    </script>
</body>
</html>
